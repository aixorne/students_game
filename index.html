<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมส์จับผิดอาการทางแพทย์</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        @import url("https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css");

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Kanit", sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        body {
            background: radial-gradient(circle, #330066 0%, #000033 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .container {
            text-align: center;
            padding: 20px;
            max-width: 600px;
            width: 100%;
            z-index: 2;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #d8fff7;
            text-shadow: 0 0 8px rgba(0, 255, 204, 0.4);
        }

        .btn {
            background-color: #ff007f;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 0, 127, 0.6);
        }

        .btn-choice {
            background-color: #630000;
            box-shadow: 0 4px 15px rgba(212, 0, 166, 0.4);
            margin: 10px;
            min-width: 150px;
        }

        .btn-choice:hover {
            box-shadow: 0 6px 20px rgba(212, 0, 166, 0.4);
        }

        #game-stage {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .image-box {
            width: 100%;
            max-width: 450px;
            height: 300px;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.1);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .score-board {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }

        /* คัสตอมสไตล์สำหรับ SweetAlert2 ให้เข้ากับธีมมืด */
        .swal2-popup-custom {
            background: #110022 !important;
            color: #ffffff !important;
            border: 2px solid #ff007f !important;
            border-radius: 20px !important;
        }
        .swal2-title-custom {
            color: #ffffff !important;
        }
        .swal2-confirm-custom {
            background-color: #ff007f !important;
            padding: 10px 30px !important;
            font-size: 1.1rem !important;
            border-radius: 50px !important;
        }
    </style>
</head>
<body class="kanit">

    <div id="start-screen" class="container">
        <h1>เกมส์จับผิดอาการทางแพทย์</h1>
        <button class="btn" onclick="startGame()">START</button>
    </div>

    <div id="game-stage" class="container">
        <div id="question-title" class="question-text">คำถามจะขึ้นตรงนี้</div>
        
        <div class="image-box">
            <img id="game-image" src="" alt="Medical Image">
        </div>
        
        <div id="button-group" class="button-group"></div>
    </div>

    <div class="score-board">
        คะแนน: <span id="score-text">0</span>
    </div>

    <script>
        const quizData = [
            {
                question: "ภาพแรก คนในภาพ นักเรียนคิดว่าสูบบุหรี่หรือไม่?",
                image: "img/img_1.png",
                choices: [
                    { text: "สูบบุหรี่", isCorrect: true },
                    { text: "ปกติ", isCorrect: false }
                ]
            },
            {
                question: "ภาพที่สอง อาการตาเหลืองตัวเหลืองแบบนี้ เสี่ยงเป็นโรคอะไร?",
                image: "img/img_2.png",
                choices: [
                    { text: "โรคกระเพาะ", isCorrect: false },
                    { text: "ไข้หวัด", isCorrect: true }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;

        const startScreen = document.getElementById('start-screen');
        const gameStage = document.getElementById('game-stage');
        const questionTitle = document.getElementById('question-title');
        const gameImage = document.getElementById('game-image');
        const buttonGroup = document.getElementById('button-group');
        const scoreText = document.getElementById('score-text');

        function startGame() {
            score = 0;
            currentQuestionIndex = 0;
            scoreText.textContent = score;
            startScreen.style.display = 'none';
            gameStage.style.display = 'flex';
            loadQuestion();
        }

        function loadQuestion() {
            const currentQuiz = quizData[currentQuestionIndex];
            questionTitle.textContent = currentQuiz.question;
            gameImage.src = currentQuiz.image;
            
            buttonGroup.innerHTML = '';
            currentQuiz.choices.forEach(choice => {
                const button = document.createElement('button');
                button.className = 'btn btn-choice';
                button.textContent = choice.text;
                button.onclick = () => handleAnswer(choice.isCorrect);
                buttonGroup.appendChild(button);
            });
        }

        // ฟังก์ชันตรวจคำตอบ (ปรับปรุงโครงสร้างตามเงื่อนไขใหม่เรียบร้อย)
        function handleAnswer(isCorrect) {
            if (isCorrect) {
                score += 10;
                scoreText.textContent = score;
                currentQuestionIndex++;

                // ตรวจสอบว่ามีข้อถัดไปให้เล่นต่อหรือไม่
                if (currentQuestionIndex < quizData.length) {
                    // แสดง swal แจ้งว่าตอบถูก และรอให้กด OK ก่อนจะดึงโจทย์ข้อต่อไปมาแสดง
                    Swal.fire({
                        title: 'ถูกต้องแล้ว!',
                        text: 'เก่งมากครับ มารับมือกับข้อต่อไปกันเลย!',
                        icon: 'success',
                        iconColor: '#00ffcc',
                        customClass: {
                            popup: 'swal2-popup-custom',
                            title: 'swal2-title-custom',
                            confirmButton: 'swal2-confirm-custom'
                        },
                        confirmButtonText: 'ลุยต่อข้อถัดไป'
                    }).then((result) => {
                        if (result.isConfirmed) {
                            loadQuestion(); // แสดงโจทย์ภาพถัดไปหลังจากกดตกลง
                        }
                    });
                } else {
                    // หากตอบถูกจนหมดครบทุกข้อแล้ว (จบเกม)
                    Swal.fire({
                        title: 'ยินดีด้วย!',
                        text: `คุณเล่นจบเกมแล้ว ได้คะแนนทั้งหมด ${score} แต้ม`,
                        icon: 'success',
                        iconColor: '#00ffcc',
                        customClass: {
                            popup: 'swal2-popup-custom',
                            title: 'swal2-title-custom',
                            confirmButton: 'swal2-confirm-custom'
                        },
                        confirmButtonText: 'กลับหน้าหลัก'
                    }).then(() => {
                        resetToMainMenu();
                    });
                }
            } else {
                // หากตอบผิด (เสียใจจังคุณได้คะแนน .... แต้ม)
                Swal.fire({
                    title: 'ผิดพลาด!',
                    text: `เสียใจจังคุณได้คะแนน ${score} แต้ม`,
                    icon: 'error',
                    iconColor: '#ff007f',
                    customClass: {
                        popup: 'swal2-popup-custom',
                        title: 'swal2-title-custom',
                        confirmButton: 'swal2-confirm-custom'
                    },
                    confirmButtonText: 'ลองใหม่อีกครั้ง'
                }).then(() => {
                    resetToMainMenu();
                });
            }
        }

        function resetToMainMenu() {
            gameStage.style.display = 'none';
            startScreen.style.display = 'block';
        }
    </script>
</body>
</html>
